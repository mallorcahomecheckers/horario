<html lang="es">

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Horario 2026"/>
  <meta name="theme-color" content="#1e293b"/>

  <link rel="manifest" href="manifest.json"/>

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f8fafc;min-height:100vh;overscroll-behavior:none;}
    button{font-family:inherit;cursor:pointer;}
    select,input,textarea{font-family:inherit;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}

    /* Header */
    #header{background:#1e293b;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;}
    #header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:10;}
    #header-title{font-weight:800;font-size:17px;}
    #header-sub{font-size:12px;color:#94a3b8;margin-top:2px;display:flex;gap:10;flex-wrap:wrap;}
    #settings-btn{background:#334155;border:none;border-radius:8px;padding:7px 12px;color:#94a3b8;font-size:14px;flex-shrink:0;}
    #sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background 0.3s;}
    #sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite;}
    #sync-dot.offline{background:#ef4444;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

    /* Month filter */
    #month-bar{background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto;padding:10px 16px;-webkit-overflow-scrolling:touch;}
    #month-pills{display:flex;gap:6px;width:max-content;}
    .pill{border-radius:20px;padding:5px 14px;font-size:13px;border:none;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
    .pill.active{background:#1e293b;color:#fff;font-weight:700;}
    .pill.inactive{background:#f1f5f9;color:#64748b;font-weight:500;}

    /* Day list */
    #list{max-width:600px;margin:0 auto;padding:16px 12px 100px;}
    .week-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px;flex-wrap:wrap;}
    .week-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;}
    .week-line{flex:1;height:1px;background:#e5e7eb;}
    .week-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .week-group{margin-bottom:24px;}
    .days-col{display:flex;flex-direction:column;gap:6px;}

    /* Day card */
    .day-card{border-radius:12px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:12;transition:box-shadow 0.12s;border-width:1.5px;border-style:solid;}
    .day-card:active{box-shadow:0 2px 12px rgba(0,0,0,0.1);}
    .day-num{text-align:center;min-width:34px;}
    .day-weekday{font-size:11px;text-transform:capitalize;font-weight:600;}
    .day-n{font-size:20px;font-weight:800;line-height:1;}
    .day-month{font-size:10px;color:#9ca3af;}
    .day-people{flex:1;display:flex;flex-direction:column;gap:3px;}
    .person-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
    .avatar-sm{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:8px;flex-shrink:0;}
    .chevron{color:#cbd5e1;font-size:16px;}

    /* Modal */
    #modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:999;}
    #modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:min(520px,100%);max-height:92vh;overflow-y:auto;padding-bottom:32px;}
    #modal-header{padding:18px 20px 12px;border-bottom:1.5px solid #f1f5f9;position:sticky;top:0;background:#fff;border-radius:20px 20px 0 0;z-index:2;}
    .close-btn{background:#f1f5f9;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;color:#64748b;display:flex;align-items:center;justify-content:center;}
    .person-card{border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;border-width:1.5px;border-style:solid;}
    .person-card-row{display:flex;align-items:center;gap:10;}
    .avatar-lg{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
    .action-btns{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
    .btn-hora{font-size:12px;font-weight:700;border-radius:7px;padding:5px 10px;white-space:nowrap;border-width:1.5px;border-style:solid;}
    .btn-vac{font-size:11px;font-weight:600;border-radius:7px;padding:4px 8px;white-space:nowrap;border-width:1px;border-style:solid;}

    /* Edit form */
    .form-section{padding:14px 20px;}
    .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:#64748b;font-size:14px;margin-bottom:14px;padding:0;}
    .time-row{display:flex;gap:12px;margin-bottom:14px;}
    .time-col{flex:1;}
    .time-label{font-size:11px;color:#6b7280;margin-bottom:6px;font-weight:700;text-transform:uppercase;}
    .time-selects{display:flex;gap:6px;align-items:center;}
    .time-select{flex:1;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 6px;font-size:17px;text-align:center;background:#f8fafc;}
    .hours-result{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-weight:700;color:#16a34a;font-size:16px;}
    .note-label{font-size:11px;color:#6b7280;margin-bottom:4px;font-weight:700;text-transform:uppercase;}
    textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px;font-size:14px;resize:vertical;}
    .form-btns{display:flex;gap:8px;margin-top:16px;}
    .btn-save{flex:1;color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;font-size:15px;transition:background 0.2s;}
    .btn-clear{background:#fff;color:#ef4444;border:1.5px solid #fca5a5;border-radius:10px;padding:12px 16px;font-weight:600;font-size:14px;}

    /* Balance bar */
    .bal-bar{border-radius:10px;padding:8px 12px;border-width:1.5px;border-style:solid;}
    .bal-bar-row{display:flex;justify-content:space-between;margin-bottom:5px;}
    .bal-track{height:6px;border-radius:4px;background:#e2e8f0;overflow:hidden;}
    .bal-fill{height:100%;border-radius:4px;transition:width 0.3s;}
    .bal-badge{font-size:11px;font-weight:700;border-radius:6px;padding:1px 6px;white-space:nowrap;border-width:1px;border-style:solid;}

    /* Settings */
    #settings-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
    #settings-sheet{background:#fff;border-radius:16px;width:min(440px,100%);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
    #settings-header{padding:16px 20px 10px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:16px 16px 0 0;z-index:2;}
    .tab-bar{display:flex;border-bottom:1px solid #f1f5f9;padding:0 20px;}
    .tab-btn{background:none;border:none;border-bottom:3px solid transparent;font-size:13px;padding:10px 14px;cursor:pointer;}
    .tab-btn.active{border-bottom-color:#2563eb;color:#2563eb;font-weight:700;}
    .tab-btn.inactive{color:#64748b;font-weight:500;}

    /* Loading */
    #loading{position:fixed;inset:0;background:#1e293b;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:9999;}
    #loading h1{font-size:24px;font-weight:800;margin-bottom:8px;}
    #loading p{color:#94a3b8;font-size:14px;}
    .spinner{width:32px;height:32px;border:3px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Toast */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;transition:transform 0.3s;white-space:nowrap;}
    #toast.show{transform:translateX(-50%) translateY(0);}
  </style>
</head>

<div id="loading">
  <div class="spinner"></div>
  <h1>📋 Horario 2026</h1>
  <p>Conectando...</p>
</div>

<div id="toast"></div>

<div id="app" style="display:none;">
  <div id="header">
    <div id="header-inner">
      <div style="flex:1;">
        <div id="header-title">📋 Horario 2026</div>
        <div id="header-sub"></div>
      </div>
      <div id="sync-dot" title="Sincronizado"></div>
      <button id="settings-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>

  <div id="month-bar">
    <div id="month-pills"></div>
  </div>

  <div id="list"></div>
</div>

<!-- Modal día -->
<div id="modal-backdrop" style="display:none;" onclick="handleBackdropClick(event)">
  <div id="modal-sheet">
    <div id="modal-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div id="modal-title" style="font-weight:800;font-size:20px;color:#0f172a;text-transform:capitalize;"></div>
          <div id="modal-sub" style="font-size:13px;color:#64748b;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px;"></div>
        </div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Settings -->
<div id="settings-backdrop" style="display:none;" onclick="handleSettingsBackdrop(event)">
  <div id="settings-sheet">
    <div id="settings-header">
      <div style="font-weight:800;font-size:17px;">⚙️ Configuración</div>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('personal')" id="tab-personal">👤 Personal</button>
      <button class="tab-btn inactive" onclick="switchTab('festivos')" id="tab-festivos">🎉 Festivos</button>
    </div>
    <div id="settings-body" style="padding:16px 20px;"></div>
  </div>
</div>

function setSyncing(v) {

}

function dbWrite(path, value) {
  setSyncing(true);
  return set(ref(db, path), value)
    .then(()=>setSyncing(false))
    .catch(e=>{ setSyncing(false); console.error(e); showToast("⚠️ Error al guardar"); });
}

function dbPatch(path, value) {
  setSyncing(true);
  return update(ref(db, path), value)
    .then(()=>setSyncing(false))
    .catch(e=>{ setSyncing(false); console.error(e); showToast("⚠️ Error al guardar"); });
}

// ── Helpers ──────────────────────────────────────────────────────────────
function parseTime(s){ if(!s) return null; const [h,m]=s.split(":").map(Number); return isNaN(h)||isNaN(m)?null:h*60+m; }
function calcH(i,s){ const a=parseTime(i),b=parseTime(s); if(a==null||b==null) return null; let d=b-a; if(d<0)d+=1440; return d/60; }
function fmtH(h,signed=false){
  if(h==null||isNaN(h)) return "—";
  const neg=h<0,ah=Math.abs(h);
  const str=`${Math.floor(ah)}h ${String(Math.round((ah%1)*60)).padStart(2,"0")}m`;
  if(signed) return (neg?"−":"+")+str; return str;
}
function ini(n){ return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2); }
function pColor(name){ const i=STATE.persons.indexOf(name); return COLORS[Math.max(i,0)%COLORS.length]; }
function isWE(dia){ return dia==="sábado"||dia==="domingo"; }
function getPRec(p,f){ return ((STATE.records[p]||{})[f])||{}; }
function isVacation(p,f){ return (STATE.vacations[p]||[]).includes(f); }
function isLibre(p,f){ return (STATE.libres[p]||[]).includes(f); }

function scrollToToday(){
  const el = document.getElementById("day-"+TODAY);
  if(el){ el.scrollIntoView({behavior:"smooth", block:"center"}); }
}

function groupByWeek(data){
  const weeks=[]; let cur=null;
  data.forEach(d=>{ if(!cur||cur.semana!==d.semana){cur={semana:d.semana,days:[]}; weeks.push(cur);} cur.days.push(d); });
  return weeks;
}

function effectiveTarget(person, days){
  const target = STATE.targets[person]; if(!target) return null;
  const workDays = days.filter(d=>!isWE(d.dia));
  if(workDays.length===0) return 0;
  const hPerDay = target/5;
  let off=0;
  // Only vacations and libres reduce target — festivos no longer block
  workDays.forEach(d=>{
    if(isVacation(person,d.fecha)) off++;
    else if(isLibre(person,d.fecha)) off++;
  });
  return Math.max(0,(workDays.length-off)*hPerDay);
}

function weekDone(p,days){ return days.reduce((s,d)=>{ const r=getPRec(p,d.fecha); return s+(calcH(r.ingreso,r.salida)||0); },0); }

function todayRemaining(p,days){
  const tgt=effectiveTarget(p,days); if(tgt==null) return null;
  const bal=tgt-weekDone(p,days); if(bal<=0) return 0;
  const ti=days.findIndex(d=>d.fecha===TODAY); if(ti===-1) return null;
  const remDays=days.slice(ti).filter(d=>!isWE(d.dia)&&!isVacation(p,d.fecha)&&!isLibre(p,d.fecha)).length;
  return remDays>0?bal/remDays:null;
}

const WEEKS = groupByWeek(CALENDAR_DATA);
const MONTHS = (() => {
  const seen=new Set();
  return CALENDAR_DATA.filter(d=>{ const n=parseInt(d.casa); return !isNaN(n)&&n>=1&&n<=12&&!seen.has(n)&&seen.add(n); })
    .map(d=>parseInt(d.casa)).sort((a,b)=>a-b);
})();

// ── Toast ────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200); }

// ── Balance bar HTML ─────────────────────────────────────────────────────
function balBarHTML(done, target, small=false){
  if(target==null) return "";
  const bal=done-target, over=bal>=0;
  const pct=Math.min(100, target>0?Math.round((done/target)*100):100);
  const color=over?"#16a34a":done>0?"#d97706":"#94a3b8";
  const bg=over?"#f0fdf4":done>0?"#fffbeb":"#f8fafc";
  const border=over?"#86efac":done>0?"#fcd34d":"#e2e8f0";
  if(small) return `<span class="bal-badge" style="color:${color};background:${bg};border-color:${border};">${fmtH(done)}/${fmtH(target)} ${fmtH(bal,true)}</span>`;
  return `<div class="bal-bar" style="background:${bg};border-color:${border};">
    <div class="bal-bar-row"><span style="font-size:12px;color:#64748b;">Hechas <b style="color:#0f172a;">${fmtH(done)}</b> / ${fmtH(target)}</span><span style="font-size:13px;font-weight:800;color:${color};">${fmtH(bal,true)}</span></div>
    <div class="bal-track"><div class="bal-fill" style="background:${color};width:${pct}%;"></div></div>
  </div>`;
}

function dayCardHTML(d, week){
  const isToday=d.fecha===TODAY, isWeekend=isWE(d.dia), isFestivo=!!STATE.festivos[d.fecha];
  const anyRec=STATE.persons.some(p=>{const r=getPRec(p,d.fecha);return r.ingreso&&r.salida;});
  const anyVac=STATE.persons.some(p=>isVacation(p,d.fecha));
  const anyLibre=STATE.persons.some(p=>isLibre(p,d.fecha));
  let borderColor="#e5e7eb", bgColor=isToday?"#eff6ff":isWeekend?"#f9fafb":"#fff";
  if(isToday) borderColor="#2563eb";
  else if(anyVac){ borderColor="#67e8f9"; bgColor="#f0fdff"; }
  else if(anyLibre){ borderColor="#a78bfa"; bgColor="#faf5ff"; }
  else if(isFestivo){ borderColor="#fbbf24"; bgColor="#fffbeb"; }
  else if(anyRec) borderColor="#86efac";

  const festLabel = isFestivo?`<div style="font-size:11px;font-weight:700;color:#b45309;">🎉 ${STATE.festivos[d.fecha]}</div>`:"";
  const people = STATE.persons.map((p,i)=>{
    const r=getPRec(p,d.fecha), h=calcH(r.ingreso,r.salida), has=r.ingreso&&r.salida;
    const vac=isVacation(p,d.fecha), libre=isLibre(p,d.fecha);
    const c=COLORS[i%COLORS.length];
    const dayRem = isToday&&week ? todayRemaining(p,week.days) : null;
    const avatarBg = vac?"#67e8f9":libre?"#a78bfa":has?c:`${c}30`;
    const avatarColor = vac?"#0e7490":libre?"#fff":has?"#fff":c;
    const text = vac?`<span style="font-size:11px;color:#0e7490;font-weight:600;">🏖 Vacaciones</span>`
      : libre?`<span style="font-size:11px;color:#7c3aed;font-weight:600;">🌴 Libre</span>`
      : has?`<span style="font-size:12px;color:#374151;">${r.ingreso}→${r.salida} <b style="color:#16a34a;">${fmtH(h)}</b></span>`
      : `<span style="font-size:12px;color:#d1d5db;">—</span>`;
    const remBadge = (isToday&&dayRem!==null&&!vac&&!libre)
      ? `<span style="font-size:10px;color:${dayRem<=0?"#16a34a":"#d97706"};font-weight:700;background:${dayRem<=0?"#f0fdf4":"#fffbeb"};border-radius:5px;padding:1px 5px;">${dayRem<=0?"✓":`~${fmtH(dayRem)} hoy`}</span>` : "";
    const noteIcon = r.nota?`<span title="${r.nota}" style="font-size:10px;">💬</span>`:"";
    return `<div class="person-row"><div class="avatar-sm" style="background:${avatarBg};color:${avatarColor};">${ini(p)}</div>${text}${noteIcon}${remBadge}</div>`;
  }).join("");

  return `<div id="day-${d.fecha}" class="day-card" style="background:${bgColor};border-color:${borderColor};border-width:${isToday?"2px":"1.5px"};" onclick="openModal('${d.fecha}')">
    <div class="day-num">
      <div class="day-weekday" style="color:${isWeekend?"#9ca3af":"#6b7280"};">${d.dia.slice(0,3)}</div>
      <div class="day-n" style="color:${isToday?"#2563eb":isFestivo?"#b45309":isWeekend?"#9ca3af":"#1e293b"};">${d.fecha.slice(8)}</div>
      <div class="day-month">${MESES_C[parseInt(d.casa)]||""}</div>
    </div>
    <div class="day-people">${festLabel}${people}</div>
    <div class="chevron">›</div>
  </div>`;
}

    const avatarBg = vac?"#67e8f9":libre?"#a78bfa":has?c:`${c}20`;

      : `<div style="font-size:13px;color:#94a3b8;">${isFestivo?"Festivo (laborable)":"Sin registrar"}</div>`;
    // All days active — festivos included
    const actionBtns = `<div class="action-btns">
      <button class="btn-hora" style="color:${has?"#fff":c};background:${has?c:`${c}15`};border-color:${c};" onclick="openEdit('${p}')">
        ${has?"✏️ Editar":"+ Hora"}
      </button>
      ${!isWE(d.dia)?`
      <button class="btn-vac" style="color:${vac?"#dc2626":"#0891b2"};background:${vac?"#fee2e2":"#e0f2fe"};border-color:${vac?"#fca5a5":"#7dd3fc"};" onclick="toggleVac('${p}','${d.fecha}')">
        ${vac?"✕ Quitar vac.":"🏖 Vac."}
      </button>
      <button class="btn-vac" style="color:${libre?"#dc2626":"#7c3aed"};background:${libre?"#fee2e2":"#faf5ff"};border-color:${libre?"#fca5a5":"#c4b5fd"};" onclick="toggleLibre('${p}','${d.fecha}')">
        ${libre?"✕ Quitar libre":"🌴 Libre"}
      </button>`:""}
    </div>`;
    const bal = tgt!=null?balBarHTML(done,tgt):"";
    const dayHint = (tgt!=null&&d.fecha===TODAY&&dayRem!==null&&!vac&&!libre)
      ?`<div style="font-size:12px;color:${dayRem<=0?"#16a34a":"#d97706"};font-weight:600;">${dayRem<=0?"✅ Horas de la semana completadas":`📅 Para cumplir esta semana: ~${fmtH(dayRem)} hoy`}</div>`:""
    ;
    return `<div class="person-card" style="background:${vac?"#f0fdff":libre?"#faf5ff":has?`${c}08`:"#f8fafc"};border-color:${vac?"#67e8f9":libre?"#a78bfa":has?c:"#e2e8f0"};">

window.toggleLibre = function(person, fecha){
  const cur = STATE.libres[person]||[];
  const next = cur.includes(fecha)?cur.filter(d=>d!==fecha):[...cur,fecha];
  dbWrite(`horario2026/libres/${person}`, next);

function attachEditListeners(){
  ["sel-hIn","sel-mIn","sel-hOut","sel-mOut"].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener("change", updateHoursPreview);
  });
  updateHoursPreview();
}

function updateHoursPreview(){
  const hIn=document.getElementById("sel-hIn")?.value;
  const mIn=document.getElementById("sel-mIn")?.value;
  const hOut=document.getElementById("sel-hOut")?.value;
  const mOut=document.getElementById("sel-mOut")?.value;
  window._fIn = (hIn&&mIn&&hIn.trim()&&mIn.trim())?`${hIn}:${mIn}`:"";
  window._fOut = (hOut&&mOut&&hOut.trim()&&mOut.trim())?`${hOut}:${mOut}`:"";
  const h=calcH(window._fIn,window._fOut);
  const el=document.getElementById("hrs-display");
  if(el) el.innerHTML = (window._fIn&&window._fOut&&h!=null)?`<div class="hours-result">⏱ ${fmtH(h)}</div>`:"";
}

window.doSave = function(){
  const fIn=window._fIn, fOut=window._fOut, fNote=document.getElementById("edit-note")?.value||"";

  if(btn){ btn.textContent="✓ Guardado"; btn.style.background="#16a34a"; }

};

window.switchTab = function(tab){
  settingsTab=tab;
  document.getElementById("tab-personal").className="tab-btn "+(tab==="personal"?"active":"inactive");
  document.getElementById("tab-festivos").className="tab-btn "+(tab==="festivos"?"active":"inactive");
  renderSettingsBody();
};

function renderSettingsBody(){
  const body=document.getElementById("settings-body");
  if(settingsTab==="personal") body.innerHTML=personalTabHTML();
  else body.innerHTML=festivosTabHTML();
}

function personalTabHTML(){
  const rows = STATE.persons.map((p,i)=>{
    const c=COLORS[i%COLORS.length];
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <div style="width:34px;height:34px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0;">${ini(p)}</div>
      <div style="flex:1;font-weight:600;font-size:14px;min-width:80px;">${p}</div>
      <div style="display:flex;align-items:center;gap:4px;" title="Horas por semana">
        <input type="number" min="1" max="80" value="${STATE.targets[p]||""}" placeholder="—"
          onchange="setTarget('${p}',this.value)"
          style="width:52px;border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 6px;font-size:13px;text-align:center;">
        <span style="font-size:11px;color:#94a3b8;">h/sem</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;" title="Días de vacaciones">
        <span style="font-size:13px;">🏖</span>
        <input type="number" min="0" max="60" value="${STATE.vacDays[p]||""}" placeholder="—"
          onchange="setVacDays('${p}',this.value)"
          style="width:44px;border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 6px;font-size:13px;text-align:center;">
      </div>
      <div style="display:flex;align-items:center;gap:4px;" title="Días libres">
        <span style="font-size:13px;">🌴</span>
        <input type="number" min="0" max="60" value="${STATE.libreDays[p]||""}" placeholder="—"
          onchange="setLibreDays('${p}',this.value)"
          style="width:44px;border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 6px;font-size:13px;text-align:center;">
      </div>
      <button onclick="removePerson('${p}')" style="background:none;border:none;color:#fca5a5;font-size:15px;cursor:pointer;">🗑</button>
    </div>`;
  }).join("");
  return `<div style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Configuración por persona</div>
  <div style="font-size:11px;color:#94a3b8;margin-bottom:12px;">⏱ h/sem &nbsp;·&nbsp; 🏖 Vacaciones &nbsp;·&nbsp; 🌴 Días libres</div>
  ${rows}
  <button onclick="showAddPerson()" style="display:flex;align-items:center;gap:8px;background:#f8fafc;border:1.5px dashed #cbd5e1;border-radius:10px;padding:9px 14px;cursor:pointer;color:#94a3b8;font-size:14px;width:100%;margin-top:4px;">
    <span style="font-size:18px;">+</span> Agregar persona
  </button>`;
}

window.setTarget = function(person,val){ dbPatch("horario2026/targets",{[person]:Number(val)||null}); };
window.setVacDays = function(person,val){ dbPatch("horario2026/vacDays",{[person]:Number(val)||null}); };
window.setLibreDays = function(person,val){ dbPatch("horario2026/libreDays",{[person]:Number(val)||null}); };
window.removePerson = function(person){
  const next=STATE.persons.filter(p=>p!==person);
  dbWrite("horario2026/persons",next); showToast(`${person} eliminado/a`);
};
window.showAddPerson = function(){
  const body=document.getElementById("settings-body");
  body.innerHTML=personalTabHTML().replace(
    `<button onclick="showAddPerson()"`,
    `<div style="display:flex;gap:8px;margin-top:4px;"><input id="new-person-input" autofocus placeholder="Nombre..." style="flex:1;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:14px;outline:none;" onkeydown="if(event.key==='Enter')addPerson()">
    <button onclick="addPerson()" style="background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;">✓</button>
    <button onclick="renderSettingsBody()" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;padding:8px 10px;cursor:pointer;">✕</button></div>
    <button style="display:none;" onclick="showAddPerson()"`)
  ;
  setTimeout(()=>document.getElementById("new-person-input")?.focus(),50);
};
window.addPerson = function(){
  const n=document.getElementById("new-person-input")?.value.trim();
  if(!n||STATE.persons.includes(n)) return;
  const next=[...STATE.persons,n];
  dbWrite("horario2026/persons",next); showToast(`${n} añadido/a`);
};

function festivosTabHTML(){
  const list=Object.entries(STATE.festivos).sort(([a],[b])=>a.localeCompare(b)).map(([fecha,nombre])=>`
    <div style="display:flex;align-items:center;gap:8px;background:#fef9f0;border:1px solid #fde68a;border-radius:8px;padding:7px 10px;margin-bottom:6px;">
      <span style="font-size:14px;">🎉</span>
      <span style="font-size:13px;color:#92400e;font-weight:600;min-width:90px;">${fecha.slice(8)}/${fecha.slice(5,7)}</span>
      <span style="flex:1;font-size:13px;color:#78350f;">${nombre}</span>
      <button onclick="removeFestivo('${fecha}')" style="background:none;border:none;color:#fca5a5;cursor:pointer;font-size:14px;">✕</button>
    </div>`).join("");
  return `<div style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">Festivos — reducen el objetivo semanal</div>
  <div style="max-height:260px;overflow-y:auto;margin-bottom:12px;">${list}</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <input type="date" id="new-fest-date" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 8px;font-size:13px;">
    <input id="new-fest-name" placeholder="Nombre del festivo" onkeydown="if(event.key==='Enter')addFestivo()"
      style="flex:1;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 8px;font-size:13px;outline:none;min-width:120px;">
    <button onclick="addFestivo()" style="background:#d97706;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:700;cursor:pointer;white-space:nowrap;">+ Añadir</button>
  </div>`;
}

window.removeFestivo = function(fecha){
  const next={...STATE.festivos}; delete next[fecha];
  dbWrite("horario2026/festivos",next); showToast("Festivo eliminado");
};
window.addFestivo = function(){
  const fecha=document.getElementById("new-fest-date")?.value;
  const nombre=document.getElementById("new-fest-name")?.value.trim();
  if(!fecha||!nombre) return;
  const next={...STATE.festivos,[fecha]:nombre};
  dbWrite("horario2026/festivos",next); showToast("🎉 Festivo añadido");
};
window.renderSettingsBody = renderSettingsBody;

// ── Online/offline indicator ──────────────────────────────────────────────
window.addEventListener("online",  ()=>{ document.getElementById("sync-dot").className=""; });
window.addEventListener("offline", ()=>{ document.getElementById("sync-dot").className="offline"; showToast("⚠️ Sin conexión"); });

// ── Service Worker ────────────────────────────────────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(e=>console.warn("SW:",e));
}
</script>
</body>
</html>
